<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" width="240" height="140" role="img" aria-label="Lewis structure">
  <style>
    .bond { stroke: #1f2a44; stroke-width: 4; stroke-linecap: round; }
