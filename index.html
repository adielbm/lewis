<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lewis structure</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" />
  <style>
    :root {
      --bg: #f1f1f1;
      --ink: #1f2430;
      --ink-soft: #5f6571;
      --accent: #ffeac1;
      --surface: #ffffff;
      --error-bg: #ffe9e9;
      --error-text: #8a1e1e;
      --warn-bg: #fff7df;
      --warn-text: #7a5b00;
      --border: #aaa7a2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Roboto", "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .page {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1em;
    }

    .title {
      margin: 0;
      letter-spacing: 0.01em;
      font-size: clamp(1.4rem, 3.2vw, 2.1rem);
      font-weight: 700;
    }

    header {
      text-align: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--ink-soft);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .desc {
      margin: 7px 0 0;
      color: var(--ink-soft);
      font-size: 0.77rem;
      line-height: 1.4;
    }

    .repo-link {
      margin-top: 7px;
      display: inline-block;
      font-size: 0.79rem;
    }

  

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      border-top: 1px solid var(--border);
      padding: 12px 0;
    }

    .workspace {
      margin-top: 16px;
      display: grid;
      grid-template-columns: minmax(300px, 1fr) minmax(320px, 1fr);
      gap: 12px;
    }


    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row.row-start {
      justify-content: flex-start;
    }

    .label {
      margin: 0;
      font-size: 0.9rem;
      color: var(--ink-soft);
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input {
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 7px 9px;
    }

    textarea {
      margin-top: 10px;
      width: 100%;
      min-height: 350px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      line-height: 1.4;
      padding: 12px;
      resize: vertical;
    }

    button:focus-visible {
      outline: 2px solid color-mix(in oklab, var(--accent), white 40%);
      outline-offset: 2px;
    }

    .examples-row {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .example-btn {
      border-radius: 8px;
      padding: 12px;
      font-size: 0.86rem;
    }

    .example-btn.is-active {
      background: var(--accent);
      }

    .style-card {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 11px 11px;
    }

    .style-card>summary {
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--ink-soft);
      user-select: none;
    }

    .style-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .style-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .style-field>span {
      color: var(--ink-soft);
      font-size: 0.8rem;
    }

    .style-field-wide {
      grid-column: 1 / -1;
    }

    .style-card .hint {
      margin-top: 10px;
      font-size: 0.82rem;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .preview-actions {
margin: auto;
    display: flex;
    gap: 8px;
    padding: 1em;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      box-shadow: none;
      border: 1px solid var(--border);
    }

    .secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--border);
    }

    button:hover:enabled {
      background: #ececec;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .hint {
      margin: 10px 0 0;
      font-size: 0.84rem;
      color: var(--ink-soft);
    }

    .message {
      margin-top: 10px;
      border-radius: 8px;
      padding: 8px 10px;
      font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      white-space: pre-wrap;
      font-size: 0.8rem;
    }

    .error {
      background: var(--error-bg);
      color: var(--error-text);
    }

    .warning {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .preview-wrap {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #ffffff;
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 14px;
    }

    .preview-wrap svg {
      max-width: 100%;
      height: auto;
      border: 1px dashed #cfd4de;
    }

    .preview-placeholder {
      color: var(--ink-soft);
      font-size: 0.86rem;
      font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(16, 22, 31, 0.38);
      padding: 16px;
      z-index: 50;
    }

    .confirm-overlay[hidden] {
      display: none;
    }

    .confirm-card {
      width: min(100%, 380px);
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 14px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.14);
    }

    .confirm-title {
      margin: 0;
      font-size: 0.98rem;
    }

    .confirm-text {
      margin: 7px 0 0;
      color: var(--ink-soft);
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .confirm-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    @media (max-width: 940px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 260px;
      }

      .preview-wrap {
        min-height: 320px;
      }

      .style-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <h1 class="title">Lewis structure</h1>
      <p class="subtitle">diagram generator</p>
    </header>

    <section class="workspace">
      <section class="panel">
        <div class="row row-start">
        </div>

        <div id="exampleButtons" class="examples-row" aria-label="Example structures"></div>

        <textarea id="dslInput" spellcheck="false" aria-label="Lewis DSL input"></textarea>

        <div id="errorBox" class="message error" hidden></div>
        <div id="warningBox" class="message warning" hidden></div>

        <details class="style-card" close>
          <summary>Style</summary>

          <div class="style-grid">
            <label class="style-field style-field-wide">
              <span>Font preset</span>
              <select id="fontPreset" aria-label="Font preset">
                <option value="classic">Classic serif</option>
                <option value="academic">Academic serif</option>
                <option value="modern">Modern serif</option>
                <option value="mono">Monospace</option>
                <option value="custom">Custom</option>
              </select>
            </label>

            <label class="style-field style-field-wide">
              <span>Font family override (CSS font-family value)</span>
              <input id="fontFamilyInput" type="text" value="'Times New Roman', 'Cambria', serif"
                aria-label="Font family override" />
            </label>

            <label class="style-field">
              <span>Grid step</span>
              <input id="gridStepInput" type="number" step="1" value="80" />
            </label>

            <label class="style-field">
              <span>Margin</span>
              <input id="marginInput" type="number" step="1" value="120" />
            </label>

            <label class="style-field">
              <span>Atom radius</span>
              <input id="atomRadiusInput" type="number" step="0.5" value="26" />
            </label>

            <label class="style-field">
              <span>Atom font size</span>
              <input id="atomFontSizeInput" type="number" step="1" value="36" />
            </label>

            <label class="style-field">
              <span>Charge font size</span>
              <input id="chargeFontSizeInput" type="number" step="1" value="25" />
            </label>

            <label class="style-field">
              <span>Bond width</span>
              <input id="bondWidthInput" type="number" step="0.1" value="4" />
            </label>

            <label class="style-field">
              <span>Bond gap</span>
              <input id="bondGapInput" type="number" step="0.5" value="9" />
            </label>

            <label class="style-field">
              <span>Electron distance top</span>
              <input id="dotDistanceTopInput" type="number" step="0.5" value="23" />
            </label>

            <label class="style-field">
              <span>Electron distance right</span>
              <input id="dotDistanceRightInput" type="number" step="0.5" value="25" />
            </label>

            <label class="style-field">
              <span>Electron distance bottom</span>
              <input id="dotDistanceBottomInput" type="number" step="0.5" value="25" />
            </label>

            <label class="style-field">
              <span>Electron distance left</span>
              <input id="dotDistanceLeftInput" type="number" step="0.5" value="25" />
            </label>

            <label class="style-field">
              <span>Electron gap</span>
              <input id="dotGapInput" type="number" step="0.5" value="10" />
            </label>

            <label class="style-field">
              <span>Electron radius</span>
              <input id="dotRadiusInput" type="number" step="0.1" value="3" />
            </label>
          </div>

          <div class="actions">
            <button id="resetStyleBtn" class="secondary" type="button">Reset style</button>
          </div>
        </details>

      </section>

      <section class="panel">
          <div id="svgContainer" class="preview-wrap">
          <p class="preview-placeholder">Your generated SVG will appear here.</p>
        </div>
        <div class="row row-start">
          <div class="preview-actions">
            <button id="downloadSvgBtn" class="secondary" type="button" disabled>SVG</button>
            <button id="downloadPngBtn" class="secondary" type="button" disabled>PNG</button>
          </div>
        </div>

     
      </section>
    </section>

    <footer class="footer">
      <a class="repo-link" href="https://github.com/adielbm/lewis" target="_blank" rel="noopener noreferrer">source code</a>
    </footer>

    <div id="confirmOverlay" class="confirm-overlay" hidden>
      <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmText">
        <h2 id="confirmTitle" class="confirm-title">Replace current code?</h2>
        <p id="confirmText" class="confirm-text">You have custom edits. Load this example and discard current text?</p>
        <div class="confirm-actions">
          <button id="confirmCancelBtn" class="secondary" type="button">Cancel</button>
          <button id="confirmAcceptBtn" class="primary" type="button">Replace</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.mjs"></script>
</body>

</html>
